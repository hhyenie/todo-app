<html lang="ko">
<head>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;background:#f0f4f8;color:#222;min-height:100vh}
.hero{background:linear-gradient(135deg,#1a3a5c 0%,#2e6da4 60%,#4a9fd4 100%);padding:40px 20px 30px;text-align:center;color:#fff}
.hero h1{font-size:2rem;font-weight:700;margin-bottom:8px;text-shadow:0 2px 8px rgba(0,0,0,.3)}
.hero p{font-size:1rem;opacity:.85}
.badge{display:inline-block;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);border-radius:20px;padding:4px 14px;font-size:.8rem;margin-bottom:16px}
.container{max-width:960px;margin:0 auto;padding:24px 16px}
.card{background:#fff;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.08);padding:28px;margin-bottom:24px}
.card h2{font-size:1.2rem;color:#1a3a5c;margin-bottom:20px;display:flex;align-items:center;gap:8px}
.card h2::before{content:'';display:inline-block;width:4px;height:20px;background:#2e6da4;border-radius:2px}
.track-btns{display:flex;gap:12px;margin-bottom:24px}
.track-btn{flex:1;padding:14px;border:2px solid #ddd;border-radius:10px;background:#fff;font-size:1rem;font-weight:600;cursor:pointer;transition:.2s;color:#555}
.track-btn.active{border-color:#2e6da4;background:#eaf2fb;color:#1a3a5c}
.grade-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:14px}
.grade-item{display:flex;flex-direction:column;gap:6px}
.grade-item label{font-size:.85rem;font-weight:600;color:#555}
.grade-item select{padding:10px;border:1.5px solid #ddd;border-radius:8px;font-size:1rem;background:#fafafa;cursor:pointer;transition:.2s}
.grade-item select:focus{outline:none;border-color:#2e6da4;background:#fff}
.calc-btn{width:100%;padding:16px;background:linear-gradient(135deg,#1a3a5c,#2e6da4);color:#fff;border:none;border-radius:12px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:.2s;margin-top:8px;letter-spacing:.5px}
.calc-btn:hover{opacity:.9;transform:translateY(-1px)}
#results{display:none}
.summary-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:12px;margin-bottom:8px}
.sum-item{background:#f0f4f8;border-radius:10px;padding:12px;text-align:center}
.sum-item .label{font-size:.75rem;color:#666;margin-bottom:4px}
.sum-item .grade{font-size:1.8rem;font-weight:700;color:#1a3a5c}
.sum-item .name{font-size:.8rem;color:#888}
.tabs{display:flex;gap:4px;margin-bottom:20px;border-bottom:2px solid #eee}
.tab{padding:10px 24px;border:none;background:none;font-size:.95rem;cursor:pointer;color:#888;border-bottom:3px solid transparent;margin-bottom:-2px;font-weight:600;transition:.2s}
.tab.active{color:#2e6da4;border-bottom-color:#2e6da4}
.filter-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.filter-btn{padding:6px 14px;border:1.5px solid #ddd;border-radius:20px;background:#fff;font-size:.85rem;cursor:pointer;transition:.2s;color:#666}
.filter-btn.active{background:#1a3a5c;color:#fff;border-color:#1a3a5c}
.dept-list{display:flex;flex-direction:column;gap:10px}
.dept-card{display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:12px;border:1.5px solid #eee;background:#fff;transition:.2s}
.dept-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.08);transform:translateY(-1px)}
.univ-badge{min-width:72px;padding:5px 0;border-radius:8px;text-align:center;font-size:.7rem;font-weight:700;color:#fff;line-height:1.3}
.dept-info{flex:1}
.dept-name{font-size:.95rem;font-weight:700;color:#222}
.dept-sub{font-size:.78rem;color:#888;margin-top:2px}
.likelihood{min-width:64px;text-align:center}
.badge-safe{background:#e6f4ea;color:#1e7e34;border:1px solid #b7dfbe;border-radius:20px;padding:4px 10px;font-size:.8rem;font-weight:700}
.badge-ok{background:#fff8e1;color:#b45309;border:1px solid #fcd34d;border-radius:20px;padding:4px 10px;font-size:.8rem;font-weight:700}
.badge-reach{background:#fef3c7;color:#d97706;border:1px solid #fcd34d;border-radius:20px;padding:4px 10px;font-size:.8rem;font-weight:700}
.badge-hard{background:#fee2e2;color:#b91c1c;border:1px solid #fca5a5;border-radius:20px;padding:4px 10px;font-size:.8rem;font-weight:700}

.score-bar{height:8px;border-radius:4px;background:#e2e8f0;overflow:hidden}
.score-bar-fill{height:100%;border-radius:4px;transition:width .6s}
.susi-section .susi-item{padding:12px 16px;border-radius:10px;margin-bottom:8px;border:1.5px solid #eee;display:flex;justify-content:space-between;align-items:center}

.susi-item .susi-cond{font-size:.78rem;color:#666;margin-top:3px}
.ok-chip{background:#e6f4ea;color:#1e7e34;padding:3px 10px;border-radius:20px;font-size:.78rem;font-weight:700}
.fail-chip{background:#fee2e2;color:#b91c1c;padding:3px 10px;border-radius:20px;font-size:.78rem;font-weight:700}
.empty-msg{text-align:center;padding:40px;color:#aaa;font-size:.95rem}

</div><!-- /results -->
</div><!-- /container -->

});

// ─── 계산 함수 ──────────────────────────────────────────
function getGrades(){
  return {
    k: parseFloat(document.getElementById('g-korean').value)||null,
    m: parseFloat(document.getElementById('g-math').value)||null,
    e: parseFloat(document.getElementById('g-english').value)||null,
    x1: parseFloat(document.getElementById('g-exp1').value)||null,
    x2: parseFloat(document.getElementById('g-exp2').value)||null,
    h: parseFloat(document.getElementById('g-history').value)||null,
  };
}

function calcScore(g, w){
  const x = (g.x1 && g.x2) ? (g.x1+g.x2)/2 : (g.x1||g.x2||5);
  const k = g.k||5, m = g.m||5, e = g.e||5;
  return w.k*k + w.m*m + w.e*e + w.x*x;
}

function getLikelihood(score, cutoff){
  const diff = score - cutoff;
  if(diff <= -0.15) return 'safe';
  if(diff <= 0.20) return 'ok';
  if(diff <= 0.60) return 'reach';
  return 'out';
}

function checkSusi(cond, g){
  if(cond.type==='none') return true;
  const x = (g.x1 && g.x2) ? Math.min(g.x1,g.x2) : (g.x1||g.x2||9);
  const map = {k:g.k||9, m:g.m||9, e:g.e||9, x:x};
  if(cond.type==='each'){
    const vals = cond.subjects.map(s=>map[s]).sort((a,b)=>a-b).slice(0,cond.n);
    return vals.every(v=>v<=cond.maxGrade);
  }
  if(cond.type==='sum'||cond.type==='sum2'){
    let vals = cond.subjects.map(s=>map[s]).sort((a,b)=>a-b);
    if(cond.mustInclude){
      const must = map[cond.mustInclude];
      vals = vals.filter((_,i)=>cond.subjects[i]===cond.mustInclude||true);
      // simplified: just take top N
    }
    const top = vals.slice(0,cond.top||3);
    return top.reduce((a,b)=>a+b,0) <= cond.maxSum;
  }
  return false;
}

// ─── 렌더링 ─────────────────────────────────────────────
function renderSummary(g){
  const names = {k:'국어',m:'수학',e:'영어',x1:'탐구①',x2:'탐구②',h:'한국사'};
  const colors = {k:'#3b82f6',m:'#ef4444',e:'#22c55e',x1:'#f59e0b',x2:'#f97316',h:'#8b5cf6'};
  let html='';
  Object.entries(names).forEach(([k,label])=>{
    const v = g[k]||'-';
    const color = v<=1?'#16a34a':v<=2?'#2563eb':v<=3?'#7c3aed':v<=4?'#b45309':v<=5?'#92400e':'#991b1b';
    html+=`<div class="sum-item">
      <div class="label">${label}</div>
      <div class="grade" style="color:${color}">${v}</div>
      <div class="name">${v!=='-'?v+'등급':'-'}</div>
    </div>`;
  });
  document.getElementById('summary-grid').innerHTML=html;
}

function renderJungsi(g, filter){
  const depts = DEPTS.filter(d=>d.track===currentTrack);
  let results = depts.map(d=>{
    const score = calcScore(g, d.w);
    const lk = getLikelihood(score, d.cutoff);
    return {...d, score, lk};
  }).filter(d=>d.lk!=='out');

  const order = {safe:0,ok:1,reach:2};
  results.sort((a,b)=>order[a.lk]-order[b.lk]||a.score-b.score);

  if(filter!=='all') results=results.filter(d=>d.lk===filter);

  if(results.length===0){
    document.getElementById('jungsi-list').innerHTML='<div class="empty-msg">해당 조건의 결과가 없습니다.</div>';
    return;
  }

  const lkLabel={safe:'✅ 안정권',ok:'🟡 적정권',reach:'🔥 도전권'};
  const lkBadge={safe:'badge-safe',ok:'badge-ok',reach:'badge-reach'};
  const lkColor={safe:'#16a34a',ok:'#b45309',reach:'#d97706'};

  let html='';
  let lastLk='';
  results.forEach(d=>{
    if(d.lk!==lastLk){
      html+=`<div class="section-title">${lkLabel[d.lk]}</div>`;
      lastLk=d.lk;
    }
    const pct = Math.max(0, Math.min(100, Math.round((1-(d.score-1)/(4-1))*100)));
    const fillColor = d.lk==='safe'?'#22c55e':d.lk==='ok'?'#f59e0b':'#fb923c';
    html+=`<div class="dept-card">
      <div class="univ-badge" style="background:${d.color}">${d.univ.replace('대학교','대').replace('한국외국어대','외국어대')}</div>
      <div class="dept-info">
        <div class="dept-name">${d.dept}</div>
        <div class="dept-sub">가중평균등급 <b>${d.score.toFixed(2)}</b> / 합격선 약 <b>${d.cutoff.toFixed(2)}</b> | ${d.tag}</div>
      </div>
      <div class="score-bar-wrap">
        <div class="score-bar"><div class="score-bar-fill" style="width:${pct}%;background:${fillColor}"></div></div>
        <div style="font-size:.7rem;color:#888;text-align:right;margin-top:2px">${pct}%</div>
      </div>
      <div class="likelihood"><span class="${lkBadge[d.lk]}">${lkLabel[d.lk]}</span></div>
    </div>`;
  });
  document.getElementById('jungsi-list').innerHTML=html;
}

function renderSusi(g){
  const filtered = SUSI.filter(s=>s.track==='both'||(s.track==='hum'&&currentTrack==='hum')||(s.track==='nat'&&currentTrack==='nat'));
  let html='';
  filtered.forEach(s=>{
    const pass = checkSusi(s.cond, g);
    const chip = s.cond.type==='none'
      ? '<span class="ok-chip">✅ 제한없음</span>'
      : pass
        ? '<span class="ok-chip">✅ 충족</span>'
        : '<span class="fail-chip">❌ 미충족</span>';
    html+=`<div class="susi-item" style="border-color:${pass?'#b7dfbe':'#fca5a5'}">
      <div class="susi-left">
        <div class="susi-title">${s.univ} — ${s.type}</div>
        <div class="susi-cond">수능최저: ${s.note}</div>
      </div>
      ${chip}
    </div>`;
  });
  document.getElementById('susi-list').innerHTML=html||'<div class="empty-msg">해당 결과가 없습니다.</div>';
}

function calculate(){
  const g = getGrades();
  if(!g.k||!g.m||!g.e||((!g.x1)&&(!g.x2))){
    alert('국어, 수학, 영어, 탐구 등급을 모두 입력해주세요.');
    return;
  }
  document.getElementById('results').style.display='block';
  renderSummary(g);
  renderJungsi(g, currentFilter);
  renderSusi(g);
  document.getElementById('results').scrollIntoView({behavior:'smooth'});
}

function setFilter(f, btn){
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const g = getGrades();
  if(g.k) renderJungsi(g,f);
}

function showTab(t){
  document.getElementById('tab-jungsi').classList.toggle('active',t==='jungsi');
  document.getElementById('tab-susi').classList.toggle('active',t==='susi');
  document.getElementById('pane-jungsi').style.display=t==='jungsi'?'block':'none';
  document.getElementById('pane-susi').style.display=t==='susi'?'block':'none';
}
